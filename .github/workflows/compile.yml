name: Build Switch NRO
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    container: devkitpro/devkita64:latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Hardcode Compilation
        run: |
          # 1. Компилируем C++ код в объектный файл
          /opt/devkitpro/devkitA64/bin/aarch64-none-elf-g++ -c -O2 -march=armv8-a+crc+crypto -mtune=cortex-a57 -mtp=soft -fPIE -I/opt/devkitpro/libnx/include -D__SWITCH__ source/main.cpp -o main.o

          # 2. Линкуем объектный файл с библиотекой libnx в ELF-формат
          /opt/devkitpro/devkitA64/bin/aarch64-none-elf-g++ -specs=/opt/devkitpro/libnx/switch.specs -g main.o -L/opt/devkitpro/libnx/lib -lnx -o rickrolled.elf

          # 3. Превращаем ELF в финальный NRO файл для Switch
          /opt/devkitpro/tools/bin/elf2nro rickrolled.elf rickrolled.nro --nacp=app.xml

      - name: Upload NRO Result
        uses: actions/upload-artifact@v4
        with:
          name: switch-executable
          path: |
            rickrolled.nro
            
