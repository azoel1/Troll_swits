name: Build Switch Audio App
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    container: devkitpro/devkita64:latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install ffmpeg on host
        run: |
          # Устанавливаем ffmpeg для конвертации музыки на сервере
          apt-get update && apt-get install -y ffmpeg

      - name: Convert MP3 to RAW PCM Audio
        run: |
          # Конвертируем mp3 в сырые аудио-байты (16-bit, стерео, 44100Hz)
          ffmpeg -i data/skibidi.mp3 -f s16le -acodec pcm_s16le -ar 44100 -ac 2 data/audio.bin

      - name: Compile App
        run: |
          # 1. Превращаем аудио-байты в ассемблерный код
          /opt/devkitpro/tools/bin/bin2s data/audio.bin > audio.s
          
          # 2. Компилируем этот файл в объектный код
          /opt/devkitpro/devkitA64/bin/aarch64-none-elf-gcc -c audio.s -o audio_bin.o

          # 3. Компилируем основной C++ код
          /opt/devkitpro/devkitA64/bin/aarch64-none-elf-g++ -c -O2 -march=armv8-a+crc+crypto -mtune=cortex-a57 -mtp=soft -fPIE -I/opt/devkitpro/libnx/include -D__SWITCH__ source/main.cpp -o main.o

          # 4. Линкуем код и аудио вместе
          /opt/devkitpro/devkitA64/bin/aarch64-none-elf-g++ -specs=/opt/devkitpro/libnx/switch.specs -g -fPIE -pie main.o audio_bin.o -L/opt/devkitpro/libnx/lib -lnx -o gemini.elf

          # 5. Создаем метаданные с твоим TitleID
          /opt/devkitpro/tools/bin/nacptool --create "SKIBIDI PLAYER" "User" "1.0.0" control.nacp --titleid="0x019731D6A0D80000"
          
          # 6. Собираем итоговый NRO файл с jpeg-иконкой
          /opt/devkitpro/tools/bin/elf2nro gemini.elf gemini.nro --nacp=control.nacp --icon=icon.jpeg

      - name: Upload NRO Result
        uses: actions/upload-artifact@v4
        with:
          name: switch-executable
          path: |
            gemini.nro
            
            
            
