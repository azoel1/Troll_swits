name: Build Switch Ultra Video Player
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    container: devkitpro/devkita64:latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install ffmpeg on host
        run: |
          # Устанавливаем ffmpeg прямо в систему сервера GitHub
          apt-get update && apt-get install -y ffmpeg

      - name: Convert MP4 to RAW Video Pixels
        run: |
          # Ужимаем skibidi.mp4 до 256x144 и 10 кадров в секунду, чтобы файл весил мало и помещался в память
          ffmpeg -i data/skibidi.mp4 -f rawvideo -pix_fmt rgb24 -s 256x144 -r 10 data/raw_video.bin

      - name: Compile App
        run: |
          # 1. Превращаем оптимизированные пиксели в ассемблерный код
          /opt/devkitpro/tools/bin/bin2s data/raw_video.bin > video.s
          
          # 2. Компилируем этот файл в объектный код
          /opt/devkitpro/devkitA64/bin/aarch64-none-elf-gcc -c video.s -o video_bin.o

          # 3. Компилируем основной C++ код
          /opt/devkitpro/devkitA64/bin/aarch64-none-elf-g++ -c -O2 -march=armv8-a+crc+crypto -mtune=cortex-a57 -mtp=soft -fPIE -I/opt/devkitpro/libnx/include -D__SWITCH__ source/main.cpp -o main.o

          # 4. Линкуем всё вместе (чистая libnx, без внешних сетевых библиотек)
          /opt/devkitpro/devkitA64/bin/aarch64-none-elf-g++ -specs=/opt/devkitpro/libnx/switch.specs -g -fPIE -pie main.o video_bin.o -L/opt/devkitpro/libnx/lib -lnx -o gemini.elf

          # 5. Создаем метаданные с твоим TitleID
          /opt/devkitpro/tools/bin/nacptool --create "RICKROLLED" "User" "1.0.0" control.nacp --titleid="0x019731D6A0D80000"
          
          # 6. Собираем итоговый NRO файл с jpeg-иконкой
          /opt/devkitpro/tools/bin/elf2nro gemini.elf gemini.nro --nacp=control.nacp --icon=icon.jpeg

      - name: Upload NRO Result
        uses: actions/upload-artifact@v4
        with:
          name: switch-executable
          path: |
            gemini.nro
            
            
            
