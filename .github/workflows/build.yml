name: Build APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3

    - name: Setup Java
      uses: actions/setup-java@v3
      with:
        java-version: '11'
        distribution: 'temurin'

    - name: Setup Android SDK
      uses: android-actions/setup-android@v2

    - name: Setup Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '18'

    - name: Install Cordova
      run: npm install -g cordova

    - name: Create project structure
      run: |
        mkdir -p www
        cp cookie-clicker.html www/index.html
        cp config.xml .

    - name: Add Android platform
      run: cordova platform add android

    - name: Build APK
      run: cordova build android --release

    - name: Upload APK artifact
      uses: actions/upload-artifact@v3
      with:
        name: cookie-clicker-apk
        path: platforms/android/app/build/outputs/apk/release/*.apk

    - name: Create Release
      if: startsWith(github.ref, 'refs/tags/')
      uses: actions/create-release@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        tag_name: ${{ github.ref }}
        release_name: Release ${{ github.ref }}
        draft: false
        prerelease: false

    - name: Upload to Release
      if: startsWith(github.ref, 'refs/tags/')
      uses: actions/upload-release-asset@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        upload_url: ${{ steps.create_release.outputs.upload_url }}
        asset_path: ./platforms/android/app/build/outputs/apk/release/app-release.apk
        asset_name: cookie-clicker.apk
        asset_content_type: application/vnd.android.package-archive
